<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <h1 class="text-3xl font-bold text-gray-900">Productos</h1>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Search and Filters -->
    <div class="bg-white rounded-lg shadow-sm p-6 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
          <input
            type="text"
            placeholder="Buscar productos..."
            [value]="searchTerm()"
            (input)="updateSearch($event.target.value)"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
          <select
            #categorySelect
            [value]="selectedCategory() ?? ''"
            (change)="onCategoryChange(categorySelect.value)"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option value="">Todas las categorías</option>
            <option *ngFor="let category of categories()" [value]="category.categoryId">
              {{ category.name }}
            </option>
          </select>
          <p *ngIf="loadingCategories()" class="text-xs text-gray-500 mt-1">Cargando categorías...</p>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading()" class="text-center py-8">
      <div class="inline-block">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
      </div>
      <p class="mt-4 text-gray-600">Cargando productos...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-8">
      <p class="text-red-800">{{ error() }}</p>
      <button
        (click)="loadProducts()"
        class="mt-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition"
      >
        Reintentar
      </button>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!loading() && !error() && paginatedProducts.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div
        *ngFor="let product of paginatedProducts"
        class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow overflow-hidden"
      >
        <!-- Product Image -->
        <div class="relative h-48 bg-gray-200 overflow-hidden">
          <img
            [src]="product.urlImagen"
            [alt]="product.name"
            class="w-full h-full object-cover hover:scale-110 transition-transform duration-300"
          />
        </div>

        <!-- Product Info -->
        <div class="p-4">
          <p class="text-xs text-gray-500 mb-1">{{ product.code }}</p>
          <h3 class="text-lg font-semibold text-gray-900 mb-2 line-clamp-2">{{ product.name }}</h3>
          <p class="text-sm text-gray-600 mb-3 line-clamp-2">{{ product.description }}</p>

          <!-- Price -->
          <div class="mb-4">
            <p class="text-2xl font-bold text-blue-600">${{ product.price | number:'1.2-2' }}</p>
          </div>

          <!-- Actions -->
          <div class="flex gap-2">
            <button
              [routerLink]="['/products', product.productId]"
              class="flex-1 px-4 py-2 bg-gray-200 text-gray-900 rounded-lg hover:bg-gray-300 transition font-medium"
            >
              Ver
            </button>
            <button
              (click)="addToCart(product)"
              class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
            >
              Agregar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading() && !error() && paginatedProducts.length === 0" class="text-center py-12">
      <p class="text-gray-600 text-lg">No se encontraron productos</p>
    </div>

    <!-- Pagination -->
    <div *ngIf="!loading() && totalPages > 1" class="flex justify-between items-center mt-8">
      <button
        (click)="previousPage()"
        [disabled]="currentPage() === 1"
        class="px-6 py-2 bg-gray-200 text-gray-900 rounded-lg hover:bg-gray-300 transition disabled:opacity-50 disabled:cursor-not-allowed font-medium"
      >
        Anterior
      </button>

      <div class="text-sm text-gray-600">
        Página {{ currentPage() }} de {{ totalPages }}
      </div>

      <button
        (click)="nextPage()"
        [disabled]="currentPage() === totalPages"
        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed font-medium"
      >
        Siguiente
      </button>
    </div>
  </div>
</div>
