<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <button
        (click)="goBack()"
        class="text-blue-600 hover:text-blue-800 font-medium mb-4 flex items-center"
      >
        ← Volver a productos
      </button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Loading State -->
    <div *ngIf="loading()" class="text-center py-12">
      <div class="inline-block">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
      </div>
      <p class="mt-4 text-gray-600">Cargando producto...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-8">
      <p class="text-red-800">{{ error() }}</p>
      <button
        (click)="goBack()"
        class="mt-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition"
      >
        Volver
      </button>
    </div>

    <!-- Product Details -->
    <div *ngIf="!loading() && product()" class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Product Image -->
      <div class="bg-white rounded-lg shadow-sm overflow-hidden">
        <img
          [src]="product()!.urlImagen"
          [alt]="product()!.name"
          class="w-full h-auto object-cover"
        />
      </div>

      <!-- Product Info -->
      <div class="bg-white rounded-lg shadow-sm p-6">
        <!-- Code -->
        <p class="text-sm text-gray-500 mb-2">Código: {{ product()!.code }}</p>

        <!-- Title -->
        <h1 class="text-4xl font-bold text-gray-900 mb-4">{{ product()!.name }}</h1>

        <!-- Description -->
        <p class="text-gray-600 text-lg mb-6">{{ product()!.description }}</p>

        <!-- Price -->
        <div class="mb-6 pb-6 border-b-2">
          <p class="text-5xl font-bold text-blue-600">
            ${{ product()!.price | number:'1.2-2' }}
          </p>
        </div>

        <!-- Quantity Selector -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad</label>
          <div class="flex items-center border border-gray-300 rounded-lg w-fit">
            <button
              (click)="decreaseQuantity()"
              class="px-4 py-2 text-gray-600 hover:bg-gray-100 transition"
            >
              −
            </button>
            <span class="px-6 py-2 border-l border-r border-gray-300 text-center">
              {{ quantity() }}
            </span>
            <button
              (click)="increaseQuantity()"
              class="px-4 py-2 text-gray-600 hover:bg-gray-100 transition"
            >
              +
            </button>
          </div>
        </div>

        <!-- Add to Cart Button -->
        <button
          (click)="addToCart()"
          class="w-full mb-4 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold text-lg"
        >
          Agregar al carrito
        </button>

        <!-- Success Message -->
        <div
          *ngIf="addedToCart()"
          class="bg-green-50 border border-green-200 rounded-lg p-4 text-green-800 font-medium"
        >
          ✓ Producto agregado al carrito
        </div>

        <!-- Additional Info -->
        <div class="mt-8 pt-8 border-t-2">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-sm text-gray-500">Categoría ID</p>
              <p class="text-lg font-semibold text-gray-900">{{ product()!.categoryId }}</p>
            </div>
            <div>
              <p class="text-sm text-gray-500">Vendedor ID</p>
              <p class="text-lg font-semibold text-gray-900">{{ product()!.userId }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
